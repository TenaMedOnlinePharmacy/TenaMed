spring.datasource.url=jdbc:h2:mem:tenamed_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
ocr.confidence-threshold=0.6
normalization.fuzzy.acceptance-threshold=0.10
normalization.fuzzy.ambiguity-delta=0.02
normalization.drug-lookup.cache-ttl-seconds=1
chapa.base-url=https://api.chapa.co/v1/transaction
chapa.secret-key=test-secret

jwt.secret=test-secret-key-which-is-at-least-32-bytes-long
jwt.access-expiration-ms=900000
jwt.refresh-expiration-ms=2592000000

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.ssl.enabled=false
spring.data.redis.timeout=3s
spring.data.redis.connect-timeout=3s

user.default-roles=ADMIN,PATIENT,DOCTOR,PHARMACIST
