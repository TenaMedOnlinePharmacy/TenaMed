spring.application.name=demo
spring.main.web-application-type=servlet

supabase.url=${SUPABASE_URL}
supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY}
supabase.storage.bucket=${SUPABASE_STORAGE_BUCKET:TenaMed}
supabase.storage.signed-url-expiry-seconds=${SUPABASE_SIGNED_URL_EXPIRY_SECONDS:31536000}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

ocr.veryfi.environment-url=${VERYFI_ENVIRONMENT_URL:https://api.veryfi.com/}
ocr.veryfi.process-endpoint=${VERYFI_PROCESS_ENDPOINT:/api/v8/partner/any-documents}
ocr.veryfi.client-id=${VERYFI_CLIENT_ID}
ocr.veryfi.client-secret=${VERYFI_CLIENT_SECRET}
ocr.veryfi.username=${VERYFI_USERNAME}
ocr.veryfi.api-key=${VERYFI_API_KEY}
ocr.veryfi.timeout-seconds=${VERYFI_TIMEOUT_SECONDS:15}
ocr.confidence-threshold=${OCR_CONFIDENCE_THRESHOLD:0.6}
pipeline.normalized-confidence-threshold=${PIPELINE_NORMALIZED_CONFIDENCE_THRESHOLD:0.6}
normalization.fuzzy.acceptance-threshold=${NORMALIZATION_FUZZY_ACCEPTANCE_THRESHOLD:0.10}
normalization.fuzzy.ambiguity-delta=${NORMALIZATION_FUZZY_AMBIGUITY_DELTA:0.02}
normalization.drug-lookup.cache-ttl-seconds=${NORMALIZATION_DRUG_LOOKUP_CACHE_TTL_SECONDS:60}

chapa.base-url=${CHAPA_BASE_URL:https://api.chapa.co/v1/transaction}
chapa.secret-key=${CHAPA_SECRET_KEY}

jwt.secret=${JWT_SECRET}
jwt.access-expiration-ms=${JWT_ACCESS_EXPIRATION_MS:900000}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:2592000000}

spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${REDIS_SSL_ENABLED:false}
spring.data.redis.timeout=3s
spring.data.redis.connect-timeout=3s

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

user.default-roles=ADMIN,PATIENT,DOCTOR,PHARMACIST,PHARMACYOWNER,HOSPITAL_OWNER,ADMIN_PHARMACIST

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.invitation.base-url=${INVITATION_BASE_URL}
