<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Manual Review STOMP Test Client</title>
  <style>
    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      margin: 24px;
      color: #1f2937;
    }
    .row { margin-bottom: 12px; }
    input, button {
      padding: 8px 10px;
      margin-right: 8px;
    }
    #log {
      white-space: pre-wrap;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 10px;
      background: #f9fafb;
      height: 340px;
      overflow: auto;
      font-family: Consolas, "Courier New", monospace;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <h2>Manual Review WebSocket STOMP Client</h2>

  <div class="row">
    <label for="wsUrl">WebSocket URL:</label>
    <input id="wsUrl" type="text" size="60" value="ws://localhost:8080/ws">
  </div>

  <div class="row">
    <label for="topic">Topic:</label>
    <input id="topic" type="text" size="30" value="/topic/tasks">
  </div>

  <div class="row">
    <button id="connectBtn">Connect</button>
    <button id="disconnectBtn" disabled>Disconnect</button>
    <button id="clearBtn">Clear Log</button>
  </div>

  <div id="log"></div>

  <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>
  <script>
    let client = null;

    function log(message) {
      const area = document.getElementById("log");
      const now = new Date().toISOString();
      area.textContent += "[" + now + "] " + message + "\n";
      area.scrollTop = area.scrollHeight;
    }

    document.getElementById("connectBtn").addEventListener("click", () => {
      const wsUrl = document.getElementById("wsUrl").value.trim();
      const topic = document.getElementById("topic").value.trim();

      if (!wsUrl) {
        log("WebSocket URL is required");
        return;
      }
      if (!topic) {
        log("Topic is required");
        return;
      }

      client = new StompJs.Client({
        brokerURL: wsUrl,
        reconnectDelay: 5000,
        heartbeatIncoming: 10000,
        heartbeatOutgoing: 10000,
        debug: (str) => log("STOMP: " + str)
      });

      client.onConnect = () => {
        log("Connected");
        client.subscribe(topic, (message) => {
          log("EVENT: " + message.body);
        });
        log("Subscribed to " + topic);

        document.getElementById("connectBtn").disabled = true;
        document.getElementById("disconnectBtn").disabled = false;
      };

      client.onStompError = (frame) => {
        log("STOMP ERROR: " + frame.headers["message"] + " | " + frame.body);
      };

      client.onWebSocketError = (event) => {
        log("WebSocket error: " + JSON.stringify(event));
      };

      client.onWebSocketClose = () => {
        log("WebSocket closed");
        document.getElementById("connectBtn").disabled = false;
        document.getElementById("disconnectBtn").disabled = true;
      };

      client.activate();
      log("Connecting to " + wsUrl);
    });

    document.getElementById("disconnectBtn").addEventListener("click", () => {
      if (client) {
        client.deactivate();
        client = null;
      }
      document.getElementById("connectBtn").disabled = false;
      document.getElementById("disconnectBtn").disabled = true;
      log("Disconnected");
    });

    document.getElementById("clearBtn").addEventListener("click", () => {
      document.getElementById("log").textContent = "";
    });
  </script>
</body>
</html>
